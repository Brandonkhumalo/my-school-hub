<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#172554" />
  <title>Offline — My School Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: #1e3a8a;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      font-size: 2.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1rem;
      color: #94a3b8;
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1.5rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      background: #1e293b;
      border: 1px solid #334155;
      font-size: 0.8rem;
      color: #64748b;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }
    button {
      margin-top: 2rem;
      padding: 0.65rem 1.75rem;
      border-radius: 8px;
      background: #1d4ed8;
      color: #fff;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>My School Hub couldn't connect to the internet.</p>
  <p>Any data you've previously loaded is still available — go back to the app.</p>
  <div class="badge">
    <span class="dot"></span>
    No connection
  </div>
  <button onclick="window.location.href='/'">Back to App</button>
</body>
</html>
