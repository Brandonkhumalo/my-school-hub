# My School Hub — HTTP-only nginx config (use before running certbot)
# After certbot creates SSL certs, the deploy script switches to schoolhub-ssl.conf

server {
    listen 80;
    server_name myschoolhub.co.zw www.myschoolhub.co.zw;

    client_max_body_size 20M;

    # ── Certbot verification (needed for initial SSL setup) ──────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Backend API → Django (Gunicorn :8000) ────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Django admin panel ───────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check ─────────────────────────────────────────────────────
    location /health/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── Django static files (WhiteNoise serves via Gunicorn) ─────────────
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── Media files (uploaded homework, etc.) ────────────────────────────
    location /media/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── Frontend (React SPA) — everything else ───────────────────────────
    location / {
        root /var/www/schoolhub/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
