# My School Hub — Full HTTPS nginx config (after certbot has created SSL certs)
# Deploy script auto-selects this when /etc/letsencrypt/live/myschoolhub.co.zw/ exists

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────
server {
    listen 80;
    server_name myschoolhub.co.zw www.myschoolhub.co.zw;

    # Certbot renewal verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name myschoolhub.co.zw www.myschoolhub.co.zw;

    ssl_certificate     /etc/letsencrypt/live/myschoolhub.co.zw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myschoolhub.co.zw/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # ── Backend API → Go Gateway (:8080) ────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Django admin panel (routed via gateway) ──
    location /django-admin/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check (via gateway) ─────────────────────────────────────────────────────
    location /health/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # ── Backend static files (via gateway) ─────────────
    location /static/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # ── Media files (uploaded logos, homework, etc.) ────────────────────
    location /media/ {
        alias /var/www/schoolhub/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Frontend (React SPA) — everything else ───────────────────────────
    location / {
        root /var/www/schoolhub/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets (JS/CSS/images from Vite build)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
