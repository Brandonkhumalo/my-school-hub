    <!-- Structured Data: FAQ (rich snippets in search results) -->
    <script type="application/ld+json">

      "mainEntity": [

          "@type": "Question",
          "name": "What is MySchoolHub?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MySchoolHub is a cloud-based school management system built for Zimbabwean primary and secondary schools. It covers student records, fee collection, attendance, results, timetables, HR, and WhatsApp parent communication — all in one platform."
          }
        },
        {
          "@type": "Question",
          "name": "Does MySchoolHub support ZIMSEC and Cambridge schools in Zimbabwe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. MySchoolHub supports both ZIMSEC and Cambridge curricula. Schools can track results, generate report cards, and configure assessment plans for either examination board."
          }
        },
        {
          "@type": "Question",
          "name": "How do schools in Zimbabwe get started with MySchoolHub?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Contact Tishanyq Digital via the Contact page or call +263 78 160 3382. The team handles onboarding, data imports, and staff training. No IT expertise is required."
          }
        },
        {
          "@type": "Question",
          "name": "Does MySchoolHub integrate with PayNow Zimbabwe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. MySchoolHub includes built-in PayNow Zimbabwe integration, allowing schools to collect school fees online via EcoCash, InnBucks, and bank transfer directly through the platform."
          }
        },
        {
          "@type": "Question",
          "name": "Is MySchoolHub suitable for both day schools and boarding schools in Zimbabwe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. MySchoolHub supports day schools, boarding schools, and combined schools. The boarding module covers dormitory management, meal attendance, exeat requests, tuck wallets, and wellness check-ins."
          }
        }
      ]
    }
