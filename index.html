<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />

    <!-- Primary SEO -->
    <title>MySchoolHub — School Management System Zimbabwe | ZIMSEC &amp; Cambridge</title>
    <meta name="description" content="MySchoolHub is Zimbabwe's leading school management system. Manage students, fees, results, timetables, attendance, and parent communication — all in one platform. Supports ZIMSEC and Cambridge. Used by primary and secondary schools across Zimbabwe." />
    <meta name="keywords" content="school management system Zimbabwe, ZIMSEC school software, school fees management Zimbabwe, student results system Zimbabwe, school administration software Zimbabwe, Zimbabwe school ERP, Cambridge school Zimbabwe, secondary school management Zimbabwe, primary school software Zimbabwe, school management Harare, Bulawayo school system, MySchoolHub" />
    <meta name="author" content="Tishanyq Digital" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://myschoolhub.co.zw/" />

    <!-- Open Graph (Facebook, WhatsApp previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://myschoolhub.co.zw/" />
    <meta property="og:title" content="MySchoolHub — School Management System Zimbabwe" />
    <meta property="og:description" content="Zimbabwe's all-in-one school management platform. Students, fees, results, timetables, attendance, and WhatsApp parent alerts — built for ZIMSEC and Cambridge schools." />
    <meta property="og:image" content="https://myschoolhub.co.zw/logo.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:site_name" content="MySchoolHub" />
    <meta property="og:locale" content="en_ZW" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://myschoolhub.co.zw/" />
    <meta name="twitter:title" content="MySchoolHub — School Management System Zimbabwe" />
    <meta name="twitter:description" content="Zimbabwe's all-in-one school management platform. Students, fees, results, timetables, attendance, and WhatsApp parent alerts." />
    <meta name="twitter:image" content="https://myschoolhub.co.zw/logo.png" />

    <!-- Geo / Regional -->
    <meta name="geo.region" content="ZW" />
    <meta name="geo.placename" content="Zimbabwe" />
    <meta name="language" content="English" />

    <!-- PWA -->
    <meta name="theme-color" content="#172554" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MySchoolHub",
      "url": "https://myschoolhub.co.zw",
      "logo": "https://myschoolhub.co.zw/logo.png",
      "description": "Zimbabwe's all-in-one school management system covering students, fees, results, timetables, attendance, and WhatsApp parent communication. Supports ZIMSEC and Cambridge curricula.",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web, Android, iOS",
      "offers": {
        "@type": "Offer",
        "priceCurrency": "USD",
        "price": "0",
        "description": "Contact for pricing"
      },
      "author": {
        "@type": "Organization",
        "name": "Tishanyq Digital",
        "url": "https://myschoolhub.co.zw"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Zimbabwe"
      },
      "featureList": [
        "Student management",
        "Fee collection and invoicing",
        "ZIMSEC and Cambridge results tracking",
        "Timetable management",
        "Attendance tracking",
        "WhatsApp parent alerts",
        "AI performance predictions",
        "PayNow Zimbabwe integration",
        "Parent portal",
        "Teacher portal"
      ]
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Tishanyq Digital",
      "url": "https://myschoolhub.co.zw",
      "logo": "https://myschoolhub.co.zw/logo.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "info@myschoolhub.co.zw",
        "contactType": "customer support",
        "areaServed": "ZW",
        "availableLanguage": "English"
      },
      "sameAs": []
    }
    </script>

    <!-- TailwindCSS (via CDN for dev, or use PostCSS config if preferred) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Drive Tailwind's `dark:` variant from the same [data-theme="dark"] attribute
      // that ThemeContext sets on <html>, so dark-mode utilities light up automatically.
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
      };
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
