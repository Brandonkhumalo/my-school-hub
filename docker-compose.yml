version: "3.9"

# ──────────────────────────────────────────────────────────────
# My School Hub — Backend Services
# ──────────────────────────────────────────────────────────────
# Start everything:   docker compose up --build
# Run in background:  docker compose up -d --build
# Stop:               docker compose down
# ──────────────────────────────────────────────────────────────

services:

  # ── Redis (Celery broker + cache) ──────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API (Gunicorn) ───────────────────────────────────
  web:
    build:
      context: ./School_system
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./School_system/.env
    environment:
      # Override broker URL to use the Redis container name
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      # Persist SQLite DB and uploaded media between restarts
      - ./School_system/db.sqlite3:/app/db.sqlite3
      - media_files:/app/media
    depends_on:
      redis:
        condition: service_healthy

  # ── Celery Worker ───────────────────────────────────────────
  celery:
    build:
      context: ./School_system
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A School_system worker
        --loglevel=info
        --concurrency=2
        --queues=celery
    env_file:
      - ./School_system/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ./School_system/db.sqlite3:/app/db.sqlite3
      - media_files:/app/media
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

  # ── Celery Beat (optional periodic tasks) ──────────────────
  celery-beat:
    build:
      context: ./School_system
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A School_system beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./School_system/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ./School_system/db.sqlite3:/app/db.sqlite3
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  redis_data:
  media_files:
