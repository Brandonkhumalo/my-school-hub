# ──────────────────────────────────────────────────────────────
# My School Hub — Production (EC2 + RDS + ElastiCache)
# ──────────────────────────────────────────────────────────────
# All services pull pre-built images from ECR.
# Database (RDS) and Redis (ElastiCache) are external — no
# local containers for them.
#
# Nginx runs on the host (not in Docker) and handles:
#   - SSL termination (Let's Encrypt)
#   - Serving the React frontend from /var/www/schoolhub/dist
#   - Proxying /api/ and /admin/ to Django on :8000
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
# ──────────────────────────────────────────────────────────────

services:

  # ── Django API (Gunicorn) ───────────────────────────────────
  web:
    image: ${ECR_REGISTRY}/schoolhub-web:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./School_system/.env
    environment:
      PORT: "8000"
    volumes:
      - media_files:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Celery Worker ───────────────────────────────────────────
  celery:
    image: ${ECR_REGISTRY}/schoolhub-web:latest
    restart: unless-stopped
    command: >
      celery -A School_system worker
        --loglevel=info
        --concurrency=2
        --queues=celery
    env_file:
      - ./School_system/.env
    volumes:
      - media_files:/app/media
    depends_on:
      web:
        condition: service_healthy

  # ── Celery Beat (periodic tasks) ────────────────────────────
  celery-beat:
    image: ${ECR_REGISTRY}/schoolhub-web:latest
    restart: unless-stopped
    command: >
      celery -A School_system beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./School_system/.env
    depends_on:
      web:
        condition: service_healthy

volumes:
  media_files:
