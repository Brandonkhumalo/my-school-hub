name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'School_system/**'
      - 'go-gateway/**'
      - 'go-workers/**'
      - 'go-services/**'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'Dockerfile'
      - 'School_system/Dockerfile'
      - 'docker-compose.prod.yml'
      - 'deploy-ec2.sh'
      - 'infrastructure/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: af-south-1

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: |
            go-gateway/go.sum
            go-workers/go.sum
            go-services/go.sum

      - name: Build Go services
        run: |
          set -euo pipefail
          for svc in go-gateway go-workers go-services; do
            echo "Building $svc"
            (cd "$svc" && go mod download && go build ./...)
          done

      - name: Build Docker images (smoke build)
        run: |
          set -euo pipefail
          docker build -t schoolhub-web:ci -f School_system/Dockerfile ./School_system
          docker build -t schoolhub-gateway:ci ./go-gateway
          docker build -t schoolhub-workers:ci ./go-workers
          docker build -t schoolhub-services:ci ./go-services

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_schoolhub
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_schoolhub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: School_system/requirements.txt

      - name: Install backend dependencies
        run: pip install -r School_system/requirements.txt

      - name: Run Django tests
        working-directory: School_system
        env:
          SECRET_KEY: test-secret-key-for-ci
          SUPERADMIN_SECRET_KEY: test-superadmin-secret-key-for-ci
          DEBUG: 'True'
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_schoolhub
          ALLOWED_HOSTS: '*'
        run: python manage.py test --verbosity=2 --parallel

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: |
            go-gateway/go.sum
            go-workers/go.sum
            go-services/go.sum

      - name: Run Go tests
        run: |
          set -euo pipefail
          for svc in go-gateway go-workers go-services; do
            echo "Testing $svc"
            (cd "$svc" && go test ./...)
          done

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          docker build \
            -t "$ECR_REGISTRY/schoolhub-web:latest" \
            -t "$ECR_REGISTRY/schoolhub-web:$IMAGE_TAG" \
            -f School_system/Dockerfile \
            ./School_system

          docker build \
            -t "$ECR_REGISTRY/schoolhub-gateway:latest" \
            -t "$ECR_REGISTRY/schoolhub-gateway:$IMAGE_TAG" \
            ./go-gateway

          docker build \
            -t "$ECR_REGISTRY/schoolhub-workers:latest" \
            -t "$ECR_REGISTRY/schoolhub-workers:$IMAGE_TAG" \
            ./go-workers

          docker build \
            -t "$ECR_REGISTRY/schoolhub-services:latest" \
            -t "$ECR_REGISTRY/schoolhub-services:$IMAGE_TAG" \
            ./go-services

          docker push "$ECR_REGISTRY/schoolhub-web:latest"
          docker push "$ECR_REGISTRY/schoolhub-web:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/schoolhub-gateway:latest"
          docker push "$ECR_REGISTRY/schoolhub-gateway:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/schoolhub-workers:latest"
          docker push "$ECR_REGISTRY/schoolhub-workers:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/schoolhub-services:latest"
          docker push "$ECR_REGISTRY/schoolhub-services:$IMAGE_TAG"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            cd ~/my-school-hub

            git fetch origin main
            git checkout main
            git reset --hard origin/main

            set -a
            . School_system/.env
            set +a

            if [ -z "${ECR_REGISTRY:-}" ]; then
              echo "ECR_REGISTRY is missing in School_system/.env"
              exit 1
            fi

            aws ecr get-login-password --region af-south-1 | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            sudo mkdir -p /var/www/schoolhub/media

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            if command -v nvm >/dev/null 2>&1; then
              nvm install 20
              nvm use 20
            fi

            if ! command -v npm >/dev/null 2>&1; then
              echo "npm is not installed on EC2. Install Node.js/NVM first."
              exit 1
            fi

            npm ci --production=false
            npm run build
            sudo mkdir -p /var/www/schoolhub
            sudo rm -rf /var/www/schoolhub/dist
            sudo cp -r dist /var/www/schoolhub/

            bash infrastructure/fix-ssl.sh

            curl -fsS http://localhost:8080/health/ > /dev/null
            docker compose -f docker-compose.prod.yml exec -T web python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"
            docker compose -f docker-compose.prod.yml ps
