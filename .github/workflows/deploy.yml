# ──────────────────────────────────────────────────────────────
# My School Hub — CI/CD Pipeline
# ──────────────────────────────────────────────────────────────
# Test → Build Docker image → Push to ECR → Deploy to EC2
# EC2 runs: Nginx (SSL) + Docker (Django) + Frontend (React)
#
# Phase 2: Replace SSH deploy step with `aws ecs update-service`
# ──────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'School_system/**'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'vite.config.js'
      - 'docker-compose.prod.yml'
      - 'infrastructure/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

env:
  AWS_REGION: af-south-1
  ECR_REPOSITORY: schoolhub-web

jobs:

  # ── 1. Test Backend ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_schoolhub
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: School_system/requirements.txt

      - name: Install dependencies
        run: pip install -r School_system/requirements.txt

      - name: Run tests
        working-directory: School_system
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_schoolhub
          ALLOWED_HOSTS: '*'
        run: python manage.py test --verbosity=2 --parallel

  # ── 2. Build & Push Docker Image to ECR ─────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                        -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                        ./School_system/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  # ── 3. Deploy to EC2 (Phase 1) ─────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/my-school-hub

            # Pull latest code (discard any local server changes)
            git fetch origin main
            git reset --hard origin/main

            # ── Backend: pull new Docker image and restart ──
            set -a
            . School_system/.env
            set +a
            export ECR_REGISTRY="${ECR_REGISTRY%/schoolhub-web}"
            test -n "$ECR_REGISTRY"
            echo "Using ECR_REGISTRY=$ECR_REGISTRY"
            aws ecr get-login-password --region af-south-1 | docker login --username AWS --password-stdin $ECR_REGISTRY
            docker compose -f docker-compose.prod.yml config | grep image
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # ── Media: ensure host directory exists for bind mount ──
            sudo mkdir -p /var/www/schoolhub/media

            # ── Migrate existing media from Docker volume (one-time) ──
            if docker volume inspect my-school-hub_media_files >/dev/null 2>&1; then
              echo "Copying media from old Docker volume to host path..."
              docker run --rm -v my-school-hub_media_files:/src -v /var/www/schoolhub/media:/dst alpine sh -c "cp -rn /src/* /dst/ 2>/dev/null || true"
            fi

            # ── Frontend: rebuild React app ──
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            npm ci --production=false
            npm run build
            sudo mkdir -p /var/www/schoolhub
            sudo rm -rf /var/www/schoolhub/dist
            sudo cp -r dist /var/www/schoolhub/

            # ── SSL / Nginx: ensure config is correct ──
            bash infrastructure/fix-ssl.sh

            # ── Verify ──
            sleep 5
            curl -sf http://localhost:8000/health/ && echo "Backend OK" || echo "WARNING: backend health check failed"
            docker compose -f docker-compose.prod.yml ps

      # ── Phase 2: Replace the SSH step above with this: ──────
      # - name: Deploy to ECS
      #   run: |
      #     aws ecs update-service \
      #       --cluster schoolhub \
      #       --service schoolhub-web \
      #       --force-new-deployment \
      #       --region af-south-1
